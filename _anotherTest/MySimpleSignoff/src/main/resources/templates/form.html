<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Approval Request</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Create Approval Request</h2>
    <form id="approvalForm" action="/api/approvals" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Signoff Persons (comma separated)</label>
            <input type="text" name="signoffPersons" class="form-control" placeholder="manager1,manager2" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Main Category</label>
            <select name="mainCategory" class="form-select" id="mainCat">
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="FIN">Finance</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Sub Category</label>
            <select name="subCategory" class="form-select" id="subCat">
                <option value="HARDWARE">Hardware</option>
                <option value="SOFTWARE">Software</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea name="content" class="form-control" rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Submit</button>
        <a href="/list" class="btn btn-secondary">Back</a>
    </form>
    <script>
        document.getElementById('approvalForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/approvals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    alert('Submission failed. Please check your inputs.');
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('An unexpected error occurred.');
            }
        });
    </script>
</body>
</html>
